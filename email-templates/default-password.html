<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Your Account Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #cfdaea;
        font-family: Arial, sans-serif;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
      }
      .header {
        background-color: #212121;
        color: #ffffff;
        padding: 30px;
        text-align: center;
      }
      .content {
        padding: 40px 30px;
        color: #ffffff;
      }
      .credentials {
        background-color: #f0f9ff;
        border-left: 4px solid #0ea5e9;
        padding: 20px;
        margin: 20px 0;
        font-size: 16px;
      }
      .footer {
        background-color: #f9fafb;
        padding: 20px;
        text-align: center;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Welcome to Our Platform!</h2>
      </div>

      <div class="content">
        <p>Hello {{name}},</p>

        <p>Your account has been created. Here are your login details:</p>

        <div class="credentials">
          <p><strong>Email/Username:</strong> {{email}}</p>
          <p><strong>Default Password:</strong> {{password}}</p>
        </div>

        <p>
          We strongly recommend that you change your password after logging in
          for the first time.
        </p>
      </div>

      <div class="footer">© {{year}} Your Company. All rights reserved.</div>
    </div>
  </body>
</html>
